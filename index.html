<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的容器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --fog: #EDE9E2;
    --dust: #C9C3B8;
    --stone: #8C8478;
    --ink: #2E2B27;
    --ink-light: #5A5650;
    --accent: #9B8FA0;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .header {
    padding: 2rem 1.5rem 1rem;
    border-bottom: 0.5px solid var(--dust);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
  }
  .header-sub { font-size: 0.7rem; color: var(--stone); letter-spacing: 0.08em; margin-top: 3px; }
  .count-badge { font-size: 0.7rem; color: var(--stone); letter-spacing: 0.05em; }

  .nav {
    display: flex;
    padding: 0 1.5rem;
    border-bottom: 0.5px solid var(--dust);
  }
  .nav-btn {
    font-size: 0.72rem;
    color: var(--stone);
    padding: 0.75rem 1rem 0.65rem;
    border: none;
    background: none;
    cursor: pointer;
    letter-spacing: 0.06em;
    border-bottom: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .nav-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

  .panel { display: none; padding: 1.5rem; }
  .panel.active { display: block; }

  /* ADD */
  .add-section {
    background: white;
    border: 0.5px solid var(--dust);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .add-label { font-size: 0.68rem; color: var(--stone); letter-spacing: 0.1em; margin-bottom: 0.75rem; }

  .image-upload-area {
    border: 0.5px dashed var(--dust);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .image-upload-area:hover { border-color: var(--stone); background: var(--fog); }
  .image-upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-hint { font-size: 0.72rem; color: var(--dust); letter-spacing: 0.06em; }
  .preview-img {
    max-width: 100%;
    max-height: 180px;
    border-radius: 8px;
    object-fit: contain;
    display: none;
  }
  .remove-img {
    display: none;
    font-size: 0.65rem;
    color: var(--stone);
    background: none;
    border: 0.5px solid var(--dust);
    border-radius: 10px;
    padding: 2px 8px;
    cursor: pointer;
    margin-top: 6px;
  }

  .add-textarea {
    width: 100%;
    border: none;
    background: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--ink);
    resize: none;
    outline: none;
    line-height: 1.7;
    min-height: 60px;
  }
  .add-textarea::placeholder { color: var(--dust); }
  .add-divider { border: none; border-top: 0.5px solid var(--fog); margin: 0.75rem 0; }
  .add-row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }

  .btn-save {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.72rem;
    color: var(--ink);
    background: var(--fog);
    border: 0.5px solid var(--dust);
    border-radius: 20px;
    padding: 5px 18px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--dust); }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ENTRY CARDS */
  .entry-card {
    background: white;
    border: 0.5px solid var(--dust);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .entry-card:hover { border-color: var(--stone); }
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .entry-mood {
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .mood-dream { background: #EEE8F4; color: #6B5B7B; }
  .mood-make  { background: #E8F0E4; color: #4A6640; }
  .mood-image { background: #EDE5DD; color: #7A5C48; }
  .mood-word  { background: #E4EBF0; color: #3D5A6B; }
  .mood-feel  { background: #F0E8E8; color: #7A4A4A; }
  .mood-other { background: var(--fog);  color: var(--stone); }

  .entry-date { font-size: 0.62rem; color: var(--dust); letter-spacing: 0.04em; }

  .entry-img {
    width: 100%;
    max-height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .entry-text {
    font-size: 0.85rem;
    color: var(--ink-light);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-ai-note {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }
  .entry-keywords { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .kw-tag {
    font-size: 0.6rem;
    color: var(--stone);
    background: var(--fog);
    border-radius: 10px;
    padding: 2px 7px;
    letter-spacing: 0.04em;
  }

  .analyzing-badge {
    font-size: 0.65rem;
    color: var(--stone);
    letter-spacing: 0.06em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* DRIFT */
  .drift-card {
    background: white;
    border: 0.5px solid var(--dust);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  .drift-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; }
  .drift-mood-badge { font-size: 0.65rem; padding: 3px 12px; border-radius: 20px; letter-spacing: 0.08em; }
  .drift-text { font-family: 'Noto Serif TC', serif; font-size: 1rem; color: var(--ink); line-height: 1.9; font-weight: 300; letter-spacing: 0.05em; }
  .drift-ai { font-size: 0.75rem; color: var(--stone); font-style: italic; line-height: 1.6; }
  .drift-date { font-size: 0.65rem; color: var(--dust); letter-spacing: 0.06em; }
  .drift-empty { font-size: 0.82rem; color: var(--dust); letter-spacing: 0.06em; line-height: 2; }

  .btn-drift {
    width: 100%;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    color: var(--ink-light);
    background: none;
    border: 0.5px solid var(--dust);
    border-radius: 12px;
    padding: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .btn-drift:hover { background: var(--fog); border-color: var(--stone); }

  /* CORE */
  .core-section { margin-bottom: 1.5rem; }
  .core-title { font-size: 0.68rem; color: var(--stone); letter-spacing: 0.12em; margin-bottom: 0.75rem; }
  .core-card { background: white; border: 0.5px solid var(--dust); border-radius: 12px; padding: 1.25rem; }
  .core-result { font-family: 'Noto Serif TC', serif; font-size: 0.88rem; color: var(--ink); line-height: 1.9; font-weight: 300; letter-spacing: 0.04em; }
  .core-empty { font-size: 0.78rem; color: var(--dust); text-align: center; padding: 1.5rem 0; letter-spacing: 0.06em; line-height: 2; }
  .btn-analyze {
    width: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.78rem;
    color: var(--ink-light);
    background: var(--fog);
    border: 0.5px solid var(--dust);
    border-radius: 12px;
    padding: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .btn-analyze:hover { background: var(--dust); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }
  .theme-dots { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }
  .theme-dot { font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; background: var(--fog); color: var(--ink-light); letter-spacing: 0.04em; }
  .loading-text { font-size: 0.75rem; color: var(--stone); text-align: center; letter-spacing: 0.08em; padding: 1rem; animation: pulse 1.5s ease-in-out infinite; }

  /* SEARCH */
  .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-input {
    flex: 1;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--ink);
    background: white;
    border: 0.5px solid var(--dust);
    border-radius: 20px;
    padding: 7px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--stone); }
  .btn-search {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.72rem;
    color: var(--stone);
    background: none;
    border: 0.5px solid var(--dust);
    border-radius: 20px;
    padding: 7px 14px;
    cursor: pointer;
  }
  .empty-state { text-align: center; padding: 3rem 1rem; font-size: 0.78rem; color: var(--dust); line-height: 2.2; letter-spacing: 0.06em; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">我的容器</div>
    <div class="header-sub">丟進去，慢慢看見自己</div>
  </div>
  <div class="count-badge" id="count-badge">0 則記錄</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('add',this)">記錄</button>
  <button class="nav-btn" onclick="switchTab('all',this)">全部</button>
  <button class="nav-btn" onclick="switchTab('drift',this)">漂流</button>
  <button class="nav-btn" onclick="switchTab('core',this)">核心</button>
</nav>

<!-- ADD -->
<div class="panel active" id="panel-add">
  <div class="add-section">
    <div class="add-label">現在想放進來什麼</div>

    <div class="image-upload-area" id="upload-area">
      <input type="file" accept="image/*" id="img-input" onchange="handleImage(this)">
      <img class="preview-img" id="preview-img" alt="預覽">
      <div class="upload-hint" id="upload-hint">＋ 點這裡上傳圖片</div>
      <button class="remove-img" id="remove-img" onclick="removeImage(event)">移除圖片</button>
    </div>

    <textarea class="add-textarea" id="add-text" placeholder="一句突然想到的話、一個夢的片段、或什麼都不用寫…" rows="3"></textarea>
    <hr class="add-divider">
    <div class="add-row">
      <button class="btn-save" id="btn-save" onclick="saveEntry()">放進去</button>
    </div>
  </div>
  <div id="recent-entries"></div>
</div>

<!-- ALL -->
<div class="panel" id="panel-all">
  <div class="search-bar">
    <input class="search-input" id="search-input" placeholder="搜尋關鍵字…" oninput="renderAll()">
    <button class="btn-search" onclick="renderAll()">找</button>
  </div>
  <div id="all-entries"></div>
</div>

<!-- DRIFT -->
<div class="panel" id="panel-drift">
  <div class="drift-card" id="drift-card">
    <div class="drift-empty">按下面的按鈕<br>讓一個記憶漂回來</div>
  </div>
  <button class="btn-drift" onclick="drift()">讓一個東西漂過來 ·</button>
</div>

<!-- CORE -->
<div class="panel" id="panel-core">
  <div class="core-section">
    <div class="core-title">主題頻率</div>
    <div class="core-card" id="theme-area">
      <div class="core-empty">累積幾則記錄後<br>這裡會開始出現你的主題</div>
    </div>
  </div>
  <div class="core-section">
    <div class="core-title">AI 幫你看見的核心</div>
    <div class="core-card" id="core-result-area">
      <div class="core-empty">需要至少 5 則記錄<br>才能開始尋找核心</div>
    </div>
    <button class="btn-analyze" id="btn-analyze" onclick="analyzeCore()" disabled>請 AI 找出我的核心 ·</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'my_container_v2';
const API_URL = 'https://api.anthropic.com/v1/messages';

const moodLabel = { dream:'夢境', make:'手作', image:'視覺', word:'文字', feel:'感受', other:'其他' };
const moodClass = { dream:'mood-dream', make:'mood-make', image:'mood-image', word:'mood-word', feel:'mood-feel', other:'mood-other' };

let currentImageData = null;

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function save(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'all') renderAll();
  if (tab === 'core') renderCore();
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImageData = e.target.result;
    const preview = document.getElementById('preview-img');
    preview.src = currentImageData;
    preview.style.display = 'block';
    document.getElementById('upload-hint').style.display = 'none';
    document.getElementById('remove-img').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

function removeImage(e) {
  e.stopPropagation();
  currentImageData = null;
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('upload-hint').style.display = 'block';
  document.getElementById('remove-img').style.display = 'none';
  document.getElementById('img-input').value = '';
}

async function saveEntry() {
  const text = document.getElementById('add-text').value.trim();
  if (!text && !currentImageData) return;

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '分析中…';

  const entry = {
    id: Date.now(),
    ts: Date.now(),
    text: text || '',
    imageData: currentImageData || null,
    mood: 'other',
    keywords: [],
    aiNote: ''
  };

  const entries = load();
  entries.unshift(entry);
  save(entries);

  document.getElementById('add-text').value = '';
  removeImage({ stopPropagation: () => {} });
  btn.disabled = false;
  btn.textContent = '放進去';

  renderRecent();
  updateCount();
  updateAnalyzeBtn();

  // AI classify in background
  classifyEntry(entry.id);
}

function compressImage(dataUrl, maxWidth = 800) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = dataUrl;
  });
}

async function classifyEntry(id) {
  const entries = load();
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const entry = entries[idx];

  try {
    let content = [];
    if (entry.imageData) {
      const compressed = await compressImage(entry.imageData);
      const base64 = compressed.split(',')[1];
      content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } });
    }
    const textPrompt = entry.text
      ? `以下是這個人放進容器的內容（文字：「${entry.text}」）。`
      : '以下是這個人放進容器的一張圖片。';

    content.push({
      type: 'text',
      text: `${textPrompt}

請用繁體中文完成兩件事：
1. 判斷類型（只能選一個）：夢境、手作、視覺、文字、感受、其他
2. 用一句話（20字內）描述這個內容的情感或氛圍

回傳格式（只回傳這個JSON，不要任何其他文字或符號）：
{"mood":"dream|make|image|word|feel|other","note":"一句話描述"}`
    });

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 200, messages: [{ role: 'user', content }] })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '{}').replace(/```json|```/g, '').trim();
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    const parsed = jsonMatch ? JSON.parse(jsonMatch[0]) : {};

    const entries2 = load();
    const idx2 = entries2.findIndex(e => e.id === id);
    if (idx2 !== -1) {
      entries2[idx2].mood = parsed.mood || 'other';
      entries2[idx2].aiNote = parsed.note || '';
      save(entries2);
      renderRecent();
    }
  } catch(e) {
    console.error(e);
    // silently fail — entry stays as 'other' without note
  }
}

function entryHTML(entry, clamp = true) {
  const imgHTML = entry.imageData
    ? `<img class="entry-img" src="${entry.imageData}" alt="記錄圖片">`
    : '';
  const textHTML = entry.text
    ? `<div class="entry-text" style="${clamp ? '' : '-webkit-line-clamp:unset'}">${entry.text}</div>`
    : '';
  const noteHTML = entry.aiNote
    ? `<div class="entry-ai-note">${entry.aiNote}</div>`
    : entry.mood === 'other'
    ? `<div class="analyzing-badge">AI 分析中…</div>`
    : '';
  const mood = entry.mood || 'other';
  return `
    <div class="entry-card">
      <div class="entry-top">
        <span class="entry-mood ${moodClass[mood]}">${moodLabel[mood]}</span>
        <span class="entry-date">${formatDate(entry.ts)}</span>
      </div>
      ${imgHTML}${textHTML}${noteHTML}
    </div>`;
}

function renderRecent() {
  const entries = load().slice(0, 3);
  const el = document.getElementById('recent-entries');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state">還沒有任何記錄<br>把第一個東西放進來吧</div>';
    return;
  }
  el.innerHTML = entries.map(e => entryHTML(e)).join('');
}

function renderAll() {
  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  let entries = load();
  if (q) entries = entries.filter(e =>
    e.text.toLowerCase().includes(q) ||
    (e.aiNote||'').toLowerCase().includes(q) ||
    moodLabel[e.mood]?.includes(q)
  );
  const el = document.getElementById('all-entries');
  if (!entries.length) { el.innerHTML = '<div class="empty-state">找不到相關記錄</div>'; return; }
  el.innerHTML = entries.map(e => entryHTML(e)).join('');
}

function drift() {
  const entries = load();
  if (!entries.length) return;
  const entry = entries[Math.floor(Math.random() * entries.length)];
  const imgHTML = entry.imageData ? `<img class="drift-img" src="${entry.imageData}" alt="">` : '';
  const textHTML = entry.text ? `<div class="drift-text">${entry.text}</div>` : '';
  const noteHTML = entry.aiNote ? `<div class="drift-ai">${entry.aiNote}</div>` : '';
  const mood = entry.mood || 'other';
  document.getElementById('drift-card').innerHTML = `
    <span class="drift-mood-badge ${moodClass[mood]}">${moodLabel[mood]}</span>
    ${imgHTML}${textHTML}${noteHTML}
    <div class="drift-date">${formatDate(entry.ts)}</div>`;
}

function renderCore() {
  updateAnalyzeBtn();
  const entries = load();
  const freq = {};
  entries.forEach(e => {
    const mood = moodLabel[e.mood] || '其他';
    freq[mood] = (freq[mood]||0) + 1;
    if (e.aiNote) {
      e.aiNote.split(/[\s，。、！？]+/).filter(w=>w.length>=2).forEach(w => {
        freq[w] = (freq[w]||0) + 1;
      });
    }
  });
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0, 14);
  const themeArea = document.getElementById('theme-area');
  if (sorted.length) {
    themeArea.innerHTML = `<div class="theme-dots">${sorted.map(([k,v])=>`<span class="theme-dot">${k} ×${v}</span>`).join('')}</div>`;
  } else {
    themeArea.innerHTML = '<div class="core-empty">累積幾則記錄後<br>這裡會開始出現你的主題</div>';
  }
}

function updateAnalyzeBtn() {
  const n = load().length;
  const btn = document.getElementById('btn-analyze');
  if (btn) btn.disabled = n < 5;
  if (n < 5 && btn) btn.textContent = `請 AI 找出我的核心 · （還需要 ${5-n} 則）`;
  else if (btn) btn.textContent = '請 AI 找出我的核心 ·';
}

async function analyzeCore() {
  const entries = load();
  if (entries.length < 5) return;
  const btn = document.getElementById('btn-analyze');
  const resultArea = document.getElementById('core-result-area');
  btn.disabled = true;
  resultArea.innerHTML = '<div class="loading-text">正在閱讀你的記錄，尋找核心…</div>';

  const summary = entries.slice(0, 30).map(e => {
    const parts = [];
    if (e.mood && e.mood !== 'other') parts.push(`[${moodLabel[e.mood]}]`);
    if (e.text) parts.push(e.text);
    if (e.aiNote) parts.push(`（AI感受：${e.aiNote}）`);
    if (e.imageData) parts.push(`[圖片記錄]`);
    return parts.join(' ');
  }).join('\n');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `以下是一個人隨手放進她的「容器」裡的東西——圖片、文字、夢境片段、感受。請仔細閱讀，找出這些記錄背後的情感核心。不是表面的風格標籤，而是更深層的——這個人一直在追求或感受到的某種狀態或渴望。用溫柔、詩意但具體的繁體中文說出來，150字以內。\n\n${summary}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '無法分析，請稍後再試。';
    resultArea.innerHTML = `<div class="core-result">${text}</div>`;
  } catch(e) {
    resultArea.innerHTML = '<div class="core-empty">分析時發生錯誤，請稍後再試。</div>';
  }
  btn.disabled = false;
  btn.textContent = '重新分析 ·';
}

function updateCount() {
  const n = load().length;
  document.getElementById('count-badge').textContent = `${n} 則記錄`;
}

renderRecent();
updateCount();
updateAnalyzeBtn();
</script>
</body>
</html>
